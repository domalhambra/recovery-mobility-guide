<style>
  /* System font stack — no Google Fonts */
  :root {
    --MAIN-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    --MAIN-TITLES-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    --CODE-font: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
  }

  /* Limit content width for readability */
  #body .padding {
    max-width: 50rem;
  }

  /* Subtle bottom border on h2 elements */
  #body h2 {
    border-bottom: 1px solid var(--MAIN-LINK-color);
    padding-bottom: 0.3rem;
  }

  /* Slightly increased line-height for body text */
  #body p,
  #body li {
    line-height: 1.75;
  }

  /* --- JD-inspired sidebar styling --- */

  /* Clean separator between sidebar header and content */
  #R-header-wrapper {
    border-bottom: 1px solid #e5e5e5;
  }

  /* Generous spacing on sidebar items */
  #R-sidebar ul li {
    padding-top: 0.15rem;
    padding-bottom: 0.15rem;
  }

  /* Lighter font weight for sidebar links */
  #R-sidebar ul li a {
    font-weight: 400;
    font-size: 0.9rem;
    transition: background-color 0.2s ease;
  }

  /* Subtle right border on active item instead of bold background */
  #R-sidebar ul li.active > a {
    border-right: 3px solid #1a7a4c;
  }

  /* Make the JD numbers slightly bolder so they stand out */
  #R-sidebar ul li a .read-icon-link {
    font-weight: 600;
  }

  /* Clean border between sidebar and content */
  #R-sidebar {
    border-right: 1px solid #e5e5e5;
  }

  /* --- Inline Table of Contents (JD-style) --- */
  .inline-toc {
    background: #f9fafb;
    border: 1px solid #e5e5e5;
    border-radius: 4px;
    padding: 0.75rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
  }

  .inline-toc summary {
    font-weight: 600;
    color: var(--MAIN-TITLES-TEXT-color);
    cursor: pointer;
    margin-bottom: 0.5rem;
  }

  .inline-toc nav > ul,
  .inline-toc #TableOfContents > ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }

  .inline-toc ul ul {
    padding-left: 1.25rem;
  }

  .inline-toc li {
    padding: 0.15rem 0;
    line-height: 1.5;
  }

  .inline-toc a {
    color: var(--MAIN-LINK-color);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .inline-toc a:hover {
    color: var(--MAIN-LINK-HOVER-color);
    text-decoration: underline;
  }

  /* --- Accessibility enhancements --- */

  /* Visible focus indicators for keyboard navigation */
  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  summary:focus-visible {
    outline: 3px solid #1a7a4c;
    outline-offset: 2px;
    border-radius: 2px;
  }

  /* Skip-to-content link (visible on tab) */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 1rem;
    z-index: 9999;
    background: #1a5632;
    color: #ffffff;
    padding: 0.5rem 1rem;
    border-radius: 0 0 4px 4px;
    font-weight: 600;
    text-decoration: none;
  }
  .skip-link:focus {
    top: 0;
  }

  /* Ensure minimum touch target size (44x44px WCAG) */
  #R-sidebar ul li a {
    min-height: 2.75rem;
    display: flex;
    align-items: center;
  }

  /* Reduce motion for users who prefer it */
  @media (prefers-reduced-motion: reduce) {
    * {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }

  /* High contrast mode support */
  @media (forced-colors: active) {
    .inline-toc {
      border: 2px solid;
    }
    article .R-taxonomy.tags a.term-link {
      border: 1px solid;
    }
  }
</style>

<!-- Skip to content link for keyboard users -->
<a href="#R-body" class="skip-link">Skip to content</a>
