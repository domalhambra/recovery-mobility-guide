<!-- Variable fonts: Inter (UI/sans) + Source Serif 4 (body/serif) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" rel="stylesheet">

<style>
  /* Typography: Source Serif 4 for body text, Inter for titles & UI */
  :root {
    --MAIN-font: "Source Serif 4", Georgia, "Times New Roman", serif;
    --MAIN-font-weight: 400;
    --MAIN-font-variation-settings: normal;
    --MAIN-BOLD-font-weight: 600;
    --MAIN-TITLES-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-font-weight: 600;
    --MAIN-TITLES-font-variation-settings: normal;
    --MAIN-TITLES-H1-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-H2-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-H1-font-weight: 700;
    --MAIN-TITLES-H2-font-weight: 600;
    --CODE-font: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
  }

  /* Limit content width for readability */
  #body .padding {
    max-width: 50rem;
  }

  /* Narrower content on homepage */
  article.home > h1,
  article.home > p,
  article.home > ul,
  article.home > ol {
    max-width: 40rem;
  }

  /* Subtle bottom border on h2 elements */
  #body h2 {
    border-bottom: 1px solid var(--MAIN-LINK-color);
    padding-bottom: 0.3rem;
  }

  /* Body text line-height */
  #body p,
  #body li {
    line-height: 1.6;
  }

  /* Inter for UI elements: sidebar, nav, breadcrumbs, tags, TOC, topbar */
  #R-sidebar,
  #R-header-wrapper,
  .topbar,
  nav.breadcrumbs,
  .inline-toc,
  article .R-taxonomy.tags,
  #body table th {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* --- Link highlight effect --- */
  #body a:not(.term-link):not(.anchor) {
    text-decoration: none;
    background-image: linear-gradient(transparent 60%, rgba(184, 74, 40, 0.15) 60%);
    transition: background-image 0.2s ease;
  }
  #body a:not(.term-link):not(.anchor):hover {
    background-image: linear-gradient(transparent 60%, rgba(184, 74, 40, 0.35) 60%);
  }

  /* --- JD-inspired sidebar styling --- */

  /* Dynamic sidebar width: fits content up to max */
  #R-sidebar {
    width: fit-content;
    min-width: 14rem;
    max-width: 21rem;
    border-right: 1px solid var(--MENU-HEADER-BORDER-color);
  }
  @media screen and (max-width: 56.25em) {
    #R-sidebar {
      width: 18.75rem;
      max-width: 100%;
    }
    #R-body {
      margin-left: 0;
    }
  }

  /* Clean separator between sidebar header and content */
  #R-header-wrapper {
    border-bottom: 1px solid var(--MENU-HEADER-BORDER-color);
  }

  /* Compact spacing on sidebar items */
  #R-sidebar ul li {
    padding-top: 0.1rem;
    padding-bottom: 0.1rem;
  }

  /* Lighter font weight for sidebar links */
  #R-sidebar ul li a {
    font-weight: 400;
    font-size: 0.9rem;
    transition: background-color 0.2s ease;
  }

  /* Subtle right border on active item instead of bold background */
  #R-sidebar ul li.active > a {
    border-right: 3px solid var(--MAIN-LINK-color);
  }

  /* Make the JD numbers slightly bolder so they stand out */
  #R-sidebar ul li a .read-icon-link {
    font-weight: 600;
  }

  /* --- Inline Table of Contents (JD-style) --- */
  .inline-toc {
    background: var(--MENU-SECTIONS-ACTIVE-BG-color);
    border: 1px solid var(--MENU-HEADER-BORDER-color);
    border-radius: 4px;
    padding: 0.75rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    max-width: 24rem;
    margin-left: auto;
    margin-right: auto;
  }

  .inline-toc summary {
    font-weight: 600;
    color: var(--MAIN-TITLES-TEXT-color);
    cursor: pointer;
    margin-bottom: 0.5rem;
  }

  .inline-toc nav > ul,
  .inline-toc #TableOfContents > ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }

  .inline-toc ul ul {
    padding-left: 1.25rem;
  }

  .inline-toc li {
    padding: 0.15rem 0;
    line-height: 1.5;
  }

  .inline-toc a {
    color: var(--MAIN-LINK-color);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .inline-toc a:hover {
    color: var(--MAIN-LINK-HOVER-color);
    text-decoration: underline;
  }

  /* --- Accessibility enhancements --- */

  /* Visible focus indicators for keyboard navigation */
  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  summary:focus-visible {
    outline: 3px solid var(--MAIN-LINK-color);
    outline-offset: 2px;
    border-radius: 2px;
  }

  /* Skip-to-content link (visible on tab) */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 1rem;
    z-index: 9999;
    background: var(--MAIN-LINK-color);
    color: #ffffff;

    border-radius: 0 0 4px 4px;

    text-decoration: none;

  .skip-link:focus {
    top: 0;
  }

  /* Ensure minimum touch target size (WCAG) — compacted */
  #R-sidebar ul li a {
    min-height: 2rem;
    display: flex;
    align-items: center;
  }

  /* Reduce motion for users who prefer it */
  @media (prefers-reduced-motion: reduce) {
    * {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }

  /* --- Page metadata header --- */
  .page-meta {
    display: flex;

  /* --- Footnotes (JD-style) --- */
  .footnotes {
    margin-top: 2.5rem;

  .footnotes hr {
    display: none;

  .footnotes ol {
    padding-left: 1.25rem;

    margin-bottom: 0.5rem;

  }

  .footnotes li p {
    margin: 0;
  }

  /* Footnote reference (superscript in body text) */
  sup a.footnote-ref {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--MAIN-LINK-color);
    text-decoration: none;
    background-image: none;
    padding: 0 0.15rem;
  }

  /* Backref arrow */
  .footnotes a.footnote-backref {
    text-decoration: none;
    background-image: none;
    margin-left: 0.25rem;
  }

  /* --- Scroll progress bar --- */
  .scroll-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 3px;
    background: var(--MAIN-LINK-color);
    z-index: 10000;
    transition: width 0.1s ease-out;
  }

  /* High contrast mode support */
  @media (forced-colors: active) {
    .inline-toc {
      border: 2px solid;
    }
    article .R-taxonomy.tags a.term-link {
      border: 1px solid;
    }
  }

  /* ============================================
     Floating Field — 2D pannable card cluster
     ============================================ */

  .floating-field {
    position: relative;
    width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    mask-image: radial-gradient(ellipse 48% 48% at center, black 70%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 48% 48% at center, black 70%, transparent 100%);
    scrollbar-width: none;
    -ms-overflow-style: none;
    height: 30vh;
    margin-top: 0.5rem;
  }

  .floating-field::-webkit-scrollbar {
    display: none;
  }

  .floating-field-inner {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
    gap: 0.35rem;
    width: 200vw;
    max-width: none;
    min-height: 100%;

    margin: 0.2rem 0.05rem;

  }

  .floating-drift:nth-child(odd) {

  .floating-drift:nth-child(even) {
    margin-top: 0.5rem;
    z-index: 2;
  }

  .floating-link {
    display: inline-flex;
    align-items: center;
    padding: 0.66rem 1.2rem;

    border: 1px solid rgba(42, 37, 32, 0.06);

    box-shadow: 0 1px 6px rgba(42, 37, 32, 0.05), 0 0 0 1px rgba(42, 37, 32, 0.02);

    background-image: none !important;
    color: var(--MAIN-TEXT-color);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-weight: 450;
    line-height: 1.35;
    white-space: nowrap;
    cursor: pointer;
    transition:
      transform 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94),
      box-shadow 200ms cubic-bezier(0.25, 0.46, 0.45, 0.94),

      color 200ms cubic-bezier(0.25, 0.46, 0.45, 0.94);

  /* 8-color cycling palette — light mode */

  .floating-drift:nth-child(8n+3) .floating-link { background-color: #E6EDF1; }
  .floating-drift:nth-child(8n+4) .floating-link { background-color: #F2E4DD; }
  .floating-drift:nth-child(8n+5) .floating-link { background-color: #E9EDE6; }
  .floating-drift:nth-child(8n+6) .floating-link { background-color: #F3EAE1; }
  .floating-drift:nth-child(8n+7) .floating-link { background-color: #EDEAEF; }
  .floating-drift:nth-child(8n+8) .floating-link { background-color: #F0ECE0; }

  .floating-link:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 16px rgba(42, 37, 32, 0.14), 0 0 0 1px rgba(42, 37, 32, 0.06);

  :root[data-r-theme-variant="mobility-dark"] .floating-link:hover {

  }

  :root[data-r-theme-variant="mobility-dark"] .floating-drift:nth-child(8n+1) .floating-link { background-color: #2D2119; }

  :root[data-r-theme-variant="mobility-dark"] .floating-drift:nth-child(8n+3) .floating-link { background-color: #1E252B; }
  :root[data-r-theme-variant="mobility-dark"] .floating-drift:nth-child(8n+4) .floating-link { background-color: #2B1F18; }
  :root[data-r-theme-variant="mobility-dark"] .floating-drift:nth-child(8n+5) .floating-link { background-color: #212820; }
  :root[data-r-theme-variant="mobility-dark"] .floating-drift:nth-child(8n+6) .floating-link { background-color: #2A221A; }
  :root[data-r-theme-variant="mobility-dark"] .floating-drift:nth-child(8n+7) .floating-link { background-color: #252229; }

    :root[data-r-theme-variant="mobility-auto"] .floating-link:hover {

    }
    :root[data-r-theme-variant="mobility-auto"] .floating-drift:nth-child(8n+1) .floating-link { background-color: #2D2119; }
    :root[data-r-theme-variant="mobility-auto"] .floating-drift:nth-child(8n+2) .floating-link { background-color: #28241C; }
    :root[data-r-theme-variant="mobility-auto"] .floating-drift:nth-child(8n+3) .floating-link { background-color: #1E252B; }
    :root[data-r-theme-variant="mobility-auto"] .floating-drift:nth-child(8n+4) .floating-link { background-color: #2B1F18; }
    :root[data-r-theme-variant="mobility-auto"] .floating-drift:nth-child(8n+5) .floating-link { background-color: #212820; }
    :root[data-r-theme-variant="mobility-auto"] .floating-drift:nth-child(8n+6) .floating-link { background-color: #2A221A; }
    :root[data-r-theme-variant="mobility-auto"] .floating-drift:nth-child(8n+7) .floating-link { background-color: #252229; }

  @media (max-width: 768px) {
    .floating-field {
      height: 20vh;
    }
    .floating-field-inner {

  @media (prefers-reduced-motion: reduce) {

  /* ============================================

<!-- Scroll progress bar -->
<div class="scroll-progress" aria-hidden="true"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var bar = document.querySelector('.scroll-progress');
  var body = document.getElementById('R-body-inner');
  if (!bar || !body) return;
  body.addEventListener('scroll', function() {
    var scrollTop = body.scrollTop;
    var scrollHeight = body.scrollHeight - body.clientHeight;
    var progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    bar.style.width = progress + '%';
  });

  // Dynamic sidebar: sync body margin-left to sidebar width
  var sidebar = document.getElementById('R-sidebar');
  var body = document.getElementById('R-body');
  if (sidebar && body) {
    function syncSidebarWidth() {
      if (window.innerWidth > 900) {
        body.style.marginLeft = sidebar.offsetWidth + 'px';
      } else {
        body.style.marginLeft = '';
      }
    }
    syncSidebarWidth();
    window.addEventListener('resize', syncSidebarWidth);
    new MutationObserver(syncSidebarWidth).observe(sidebar, { childList: true, subtree: true });
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(syncSidebarWidth).observe(sidebar);
    }
  }

  // Search: show built-in shortcut in placeholder
  var searchInput = document.getElementById('R-search-by');
  if (searchInput) {
    searchInput.placeholder = 'Search (Ctrl+Alt+F)';
  }

  // ============================================
  // Floating field drift animation
  // ============================================
  var field = document.querySelector('.floating-field');
  var container = document.querySelector('.floating-field-inner');
  if (field && container) {
    var driftItems = [];
    var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var cards = container.querySelectorAll('.floating-drift');

    for (var c = 0; c < cards.length; c++) {
      var rotMag = 1.5 + Math.random() * 1.5;
      var baseRotation = (c % 2 === 0 ? 1 : -1) * rotMag;

      if (prefersReducedMotion) {
        cards[c].style.transform = 'rotate(' + baseRotation.toFixed(1) + 'deg)';
      } else {
        driftItems.push({
          el: cards[c],
          driftX: Math.random() * 5 - 2.5,
          driftY: Math.random() * 5 - 2.5,
          baseRotation: baseRotation,
          rotDelta: 0.3 + Math.random() * 0.8,
          period: (8 + Math.random() * 6) * 1000,
          offset: Math.random() * 20000
        });
      }
    }

    // Size field dynamically
    requestAnimationFrame(function () {
      if (cards.length > 0) {
        var minY = Infinity, maxY = -Infinity;
        var contRect = container.getBoundingClientRect();
        for (var i = 0; i < cards.length; i++) {
          var rect = cards[i].getBoundingClientRect();
          var top = rect.top - contRect.top;
          var bottom = rect.bottom - contRect.top;
          if (top < minY) minY = top;
          if (bottom > maxY) maxY = bottom;
        }
        var contentHeight = maxY - minY;
        var mob = window.innerWidth <= 768;
        var padding = contentHeight * 0.4;
        var desiredHeight = contentHeight + padding;
        var minH = mob ? window.innerHeight * 0.4 : window.innerHeight * 0.5;
        var maxH = window.innerHeight * 1.2;
        field.style.height = Math.max(minH, Math.min(desiredHeight, maxH)) + 'px';
      }
      // Center scroll
      field.scrollLeft = (container.scrollWidth - field.clientWidth) / 2;
    });

    // Shared drift animation loop
    if (driftItems.length > 0) {
      var driftStart = performance.now();
      function animateDrift(timestamp) {
        var elapsed = timestamp - driftStart;
        var ease = elapsed > 1000 ? 1 : elapsed / 1000;
        for (var i = 0; i < driftItems.length; i++) {
          var d = driftItems[i];
          var wave = Math.sin(((timestamp + d.offset) / d.period) * Math.PI * 2);
          var x = (d.driftX * wave * ease).toFixed(2);
          var y = (d.driftY * wave * ease).toFixed(2);
          var rot = (d.baseRotation + d.rotDelta * wave * ease).toFixed(2);
          d.el.style.transform = 'translate(' + x + 'px, ' + y + 'px) rotate(' + rot + 'deg)';
        }
        requestAnimationFrame(animateDrift);
      }
      requestAnimationFrame(animateDrift);
    }
  }

  // ============================================
  // Badwater-style color scheme toggle
  // ============================================
  var toggleBtn = document.querySelector('.toggle-color-scheme-button');
  if (toggleBtn) {
    // Map Relearn variant identifiers to toggle states
    var variantToScheme = {
      'mobility': 'light',
      'mobility-auto': 'auto',
      'mobility-dark': 'dark'
    };
    var schemeToVariant = {
      'light': 'mobility',
      'auto': 'mobility-auto',
      'dark': 'mobility-dark'
    };
    var schemeOrder = ['light', 'auto', 'dark'];

    function syncToggle() {
      var select = document.getElementById('R-select-variant');
      if (!select) return;
      var current = select.value;
      var scheme = variantToScheme[current] || 'auto';
      toggleBtn.setAttribute('data-scheme', scheme);
    }

    toggleBtn.addEventListener('click', function () {
      var currentScheme = toggleBtn.getAttribute('data-scheme') || 'light';
      var idx = schemeOrder.indexOf(currentScheme);
      var nextScheme = schemeOrder[(idx + 1) % schemeOrder.length];
      var nextVariant = schemeToVariant[nextScheme];

      // Update Relearn's hidden select and trigger change
      var select = document.getElementById('R-select-variant');
      if (select) {
        select.value = nextVariant;
        window.relearn.changeVariant(nextVariant);
      }
      toggleBtn.setAttribute('data-scheme', nextScheme);
    });

    // Sync on load
    syncToggle();

    // Re-sync if variant changes externally
    document.addEventListener('themeVariantLoaded', syncToggle);
  }
});
</script>
