<!-- Variable fonts: Inter (UI/sans) + Source Serif 4 (body/serif) — loaded async to avoid render-blocking -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" rel="stylesheet"></noscript>

<!-- Brand color for Chrome mobile address bar -->
<meta name="theme-color" content="#F7F3EE" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1714" media="(prefers-color-scheme: dark)">

<style>
  /* Typography: Source Serif 4 for body text, Inter for titles & UI */
  :root {
    --MAIN-font: "Source Serif 4", Georgia, "Times New Roman", serif;
    --MAIN-font-weight: 400;
    --MAIN-font-variation-settings: normal;
    --MAIN-BOLD-font-weight: 600;
    --MAIN-TITLES-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-font-weight: 600;
    --MAIN-TITLES-font-variation-settings: normal;
    --MAIN-TITLES-H1-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-H2-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-H1-font-weight: 700;
    --MAIN-TITLES-H2-font-weight: 600;
    --CODE-font: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
  }

  /* Prevent horizontal overflow from full-bleed elements (e.g. floating field) */
  #R-body-inner {
    overflow-x: hidden;
  }

  /* Limit content width for readability */
  #body .padding {
    max-width: 32rem;
  }

  /* Narrower content on homepage */
  article.home > h1,
  article.home > p,
  article.home > ul,
  article.home > ol {
    max-width: 40rem;
  }

  /* Subtle bottom border on h2 elements */
  #body h2 {
    border-bottom: 1px solid var(--MAIN-LINK-color);
    padding-bottom: 0.3rem;
  }

  /* Body text line-height */
  #body p,
  #body li {
    line-height: 1.6;
  }

  /* Inter for UI elements: sidebar, nav, breadcrumbs, tags, TOC, topbar */
  #R-sidebar,
  #R-header-wrapper,
  .topbar,
  nav.breadcrumbs,
  .inline-toc,
  article .R-taxonomy.tags,
  #body table th {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* --- Link highlight effect --- */
  #body a:not(.term-link):not(.anchor) {
    text-decoration: none;
    background-image: linear-gradient(transparent 60%, rgba(184, 74, 40, 0.15) 60%);
    transition: background-image 0.2s ease;
  }
  #body a:not(.term-link):not(.anchor):hover {
    background-image: linear-gradient(transparent 60%, rgba(184, 74, 40, 0.35) 60%);
  }

  /* --- JD-inspired sidebar styling --- */

  /* Dynamic sidebar width: fits content up to max */
  /* Keep sidebar title on one line, left-aligned */
  #R-logo.R-default .logo-title {
    font-size: 1.55em;
    white-space: nowrap;
    text-align: left;
  }
  #R-logo.R-default {
    justify-content: flex-start;
  }

  #R-sidebar {
    width: fit-content;
    min-width: 14rem;
    max-width: 21rem;
    border-right: 1px solid var(--MENU-HEADER-BORDER-color);
  }

  /* Collapse sidebar to hamburger at 60rem instead of Relearn's default 48rem.
     This prevents sidebar/content overlap at tablet widths. We override both
     the medium (48-60rem) and small (<48rem) Relearn breakpoints. */
  @media screen and (max-width: 60rem) {
    #R-sidebar {
      inset-inline-start: calc(-1 * var(--INTERNAL-MENU-S-width, 14.375rem));
      min-width: var(--INTERNAL-MENU-S-width, 14.375rem);
      max-width: var(--INTERNAL-MENU-S-width, 14.375rem);
      width: var(--INTERNAL-MENU-S-width, 14.375rem);
    }
    #navshow {
      display: inline;
    }
    #R-body {
      margin-inline-start: 0;
      min-width: 100%;
      max-width: 100%;
      width: 100%;
    }
    .sidebar-flyout {
      overflow: hidden;
    }
    .sidebar-flyout #R-sidebar {
      inset-inline-start: 0;
      z-index: 90;
    }
    .sidebar-flyout #R-body {
      margin-inline-start: var(--INTERNAL-MENU-S-width, 14.375rem);
      overflow: hidden;
    }
    .sidebar-flyout #R-body-overlay {
      background-color: rgba(134, 134, 134, 0.5);
      bottom: 0;
      cursor: pointer;
      height: 100vh;
      left: 0;
      position: absolute;
      right: 0;
      top: 0;
      z-index: 190;
    }
  }

  /* Clean separator between sidebar header and content */
  #R-header-wrapper {
    border-bottom: 1px solid var(--MENU-HEADER-BORDER-color);
  }

  /* Compact spacing on sidebar items */
  #R-sidebar ul li {
    padding-top: 0.1rem;
    padding-bottom: 0.1rem;
  }

  /* Lighter font weight for sidebar links */
  #R-sidebar ul li a {
    font-weight: 400;
    font-size: 0.9rem;
    transition: background-color 0.2s ease;
  }

  /* Subtle right border on active item instead of bold background */
  #R-sidebar ul li.active > a {
    border-right: 3px solid var(--MAIN-LINK-color);
  }

  /* Make the JD numbers slightly bolder so they stand out */
  #R-sidebar ul li a .read-icon-link {
    font-weight: 600;
  }

  /* --- Inline Table of Contents (JD-style) --- */
  .inline-toc {
    background: var(--MENU-SECTIONS-ACTIVE-BG-color);
    border: 1px solid var(--MENU-HEADER-BORDER-color);
    border-radius: 4px;
    padding: 0.75rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    max-width: 24rem;
    margin-left: auto;
    margin-right: auto;
  }

  .inline-toc summary {
    font-weight: 600;
    color: var(--MAIN-TITLES-TEXT-color);
    cursor: pointer;
    margin-bottom: 0.5rem;
  }

  .inline-toc nav > ul,
  .inline-toc #TableOfContents > ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }

  .inline-toc ul ul {
    padding-left: 1.25rem;
  }

  .inline-toc li {
    padding: 0.15rem 0;
    line-height: 1.5;
  }

  .inline-toc a {
    color: var(--MAIN-LINK-color);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .inline-toc a:hover {
    color: var(--MAIN-LINK-HOVER-color);
    text-decoration: underline;
  }

  /* --- Accessibility enhancements --- */

  /* Visible focus indicators for keyboard navigation */
  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  summary:focus-visible {
    outline: 3px solid var(--MAIN-LINK-color);
    outline-offset: 2px;
    border-radius: 2px;
  }

  /* Skip-to-content link (visible on tab) */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 1rem;
    z-index: 9999;
    background: var(--MAIN-LINK-color);
    color: #ffffff;
    padding: 0.5rem 1rem;
    border-radius: 0 0 4px 4px;
    font-weight: 600;
    text-decoration: none;
  }
  .skip-link:focus {
    top: 0;
  }

  /* Ensure minimum touch target size (WCAG) — compacted */
  #R-sidebar ul li a {
    min-height: 2rem;
    display: flex;
    align-items: center;
  }

  /* Reduce motion for users who prefer it */
  @media (prefers-reduced-motion: reduce) {
    * {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }

  /* --- Page metadata header --- */
  .page-meta {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    margin-bottom: 1rem;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.8rem;
  }

  .meta-difficulty {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .meta-difficulty--beginner {
    background: #d4edda;
    color: #155724;
  }

  .meta-difficulty--intermediate {
    background: #fff3cd;
    color: #856404;
  }

  .meta-difficulty--advanced {
    background: #f8d7da;
    color: #721c24;
  }

  .meta-reading-time {
    color: var(--MENU-VISITED-color);
  }

  /* --- Footnotes (JD-style) --- */
  .footnotes {
    margin-top: 2.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--MENU-HEADER-BORDER-color);
    font-size: 0.85rem;
    color: var(--MENU-VISITED-color);
  }

  .footnotes hr {
    display: none;
  }

  .footnotes ol {
    padding-left: 1.25rem;
  }

  .footnotes li {
    margin-bottom: 0.5rem;
    line-height: 1.5;
  }

  .footnotes li p {
    margin: 0;
  }

  /* Footnote reference (superscript in body text) */
  sup a.footnote-ref {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--MAIN-LINK-color);
    text-decoration: none;
    background-image: none;
    padding: 0 0.15rem;
  }

  /* Backref arrow */
  .footnotes a.footnote-backref {
    text-decoration: none;
    background-image: none;
    margin-left: 0.25rem;
  }


  /* High contrast mode support */
  @media (forced-colors: active) {
    .inline-toc {
      border: 2px solid;
    }
    article .R-taxonomy.tags a.term-link {
      border: 1px solid;
    }
  }

  /* ============================================
     Body Map — Interactive SVG navigation
     ============================================ */

  .body-map-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 1.5rem;
    max-width: 36rem;
    margin: 1rem auto 0;
    padding: 0 1rem;
  }

  .body-map-container svg {
    width: 100%;
    max-width: 14rem;
    height: auto;
  }

  .body-map-heading {
    text-align: center;
    font-family: var(--MAIN-TITLES-font);
    font-weight: var(--MAIN-TITLES-H2-font-weight);
    color: var(--MAIN-TITLES-TEXT-color);
    margin-bottom: 0.25rem;
  }

  /* Region fill and stroke defaults */
  .body-region {
    fill: var(--BODY-REGION-fill);
    stroke: var(--BODY-REGION-stroke);
    stroke-width: 0;
    cursor: pointer;
    transition: fill 200ms ease, stroke 200ms ease, stroke-width 200ms ease, transform 200ms ease;
    transform-origin: center;
    transform-box: fill-box;
  }

  /* Body outline (non-interactive background silhouette) */
  .body-outline {
    fill: var(--BODY-OUTLINE-fill);
    pointer-events: none;
  }

  /* Desktop hover */
  @media (hover: hover) {
    .body-region:hover {
      fill: var(--BODY-REGION-hover-fill);
      stroke: var(--BODY-REGION-hover-stroke);
      stroke-width: 2px;
      transform: scale(1.05);
    }
  }

  /* Active/selected state (mobile first tap, or desktop for parity) */
  .body-region.is-active {
    fill: var(--BODY-REGION-active-fill);
    stroke: var(--BODY-REGION-active-stroke);
    stroke-width: 2.5px;
    transform: scale(1.05);
  }

  /* Region label (shared element below the SVGs) */
  .body-map-label {
    text-align: center;
    font-family: var(--MAIN-TITLES-font);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--BODY-MAP-label-color);
    min-height: 1.6em;
    margin-top: 0.75rem;
    transition: opacity 150ms ease;
  }

  .body-map-label:empty {
    opacity: 0;
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    .body-region {
      transition-duration: 0.01ms !important;
    }
  }

  /* Mobile layout */
  @media (max-width: 480px) {
    .body-map-container {
      gap: 0.75rem;
    }
    .body-map-container svg {
      max-width: 10rem;
    }
  }

  /* Remove link underlines inside SVG */
  .body-region-link,
  .body-region-link:hover {
    text-decoration: none !important;
    background-image: none !important;
  }

  /* ============================================
     Body Map Context — small article-level graphic
     ============================================ */

  .body-map-context {
    float: right;
    display: flex;
    gap: 0.5rem;
    margin: 0 0 1rem 1.5rem;
  }

  .body-map-context svg {
    width: 5rem;
    height: auto;
  }

  /* In context mode, non-highlighted regions are very faint */
  .body-map-context .body-region {
    fill: var(--BODY-OUTLINE-fill);
    cursor: default;
    pointer-events: none;
  }

  .body-map-context .body-region.is-highlighted {
    fill: var(--BODY-REGION-active-fill);
    stroke: var(--BODY-REGION-active-stroke);
    stroke-width: 2px;
  }

  .body-map-context .body-outline {
    opacity: 0.5;
  }

  @media (max-width: 480px) {
    .body-map-context {
      float: none;
      justify-content: center;
      margin: 0 auto 1rem;
    }
  }

  /* Body region term page — content listing */
  .body-region-page-list {
    margin: 0.75rem 0 1.5rem;
  }

  .body-region-page-item {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--MENU-HEADER-BORDER-color);
  }

  .body-region-page-item:last-child {
    border-bottom: none;
  }

  .body-region-page-item a {
    font-family: var(--MAIN-TITLES-font);
    font-weight: 500;
  }

  .body-region-page-desc {
    font-size: 0.9rem;
    color: var(--MENU-VISITED-color);
  }

  .tab-panel summary {
    font-family: var(--MAIN-TITLES-font);
    font-weight: 600;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0.5rem 0;
    color: var(--MAIN-TITLES-TEXT-color);
  }

  .tab-panel details {
    border-bottom: 1px solid var(--MENU-HEADER-BORDER-color);
    margin-bottom: 0.25rem;
  }

  /* ============================================
     Color Scheme Toggle — Badwater style
     ============================================ */

  /* Hide default Relearn select */
  .R-variantswitcher .control-style,
  .R-variantswitcher .clear,
  .R-variantswitcher i.fa-fw {
    display: none !important;
  }

  .R-variantswitcher .menu-control {
    display: flex;
    justify-content: center;
    padding: 0.75rem 0.75rem;
  }

  .menu-control button.toggle-color-scheme-button {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.35rem 0.65rem;
    border: 1px solid var(--MENU-HEADER-BORDER-color);
    border-radius: 2rem;
    background: transparent;
    color: var(--MAIN-TEXT-color);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.8125rem;
    font-weight: 450;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    width: auto;
  }

  .toggle-color-scheme-button > .label {
    flex: 1 0 0%;
    white-space: nowrap;
  }

  .toggle-color-scheme-button > .icon-wrapper {
    position: relative;
    flex: 0 0 auto;
    width: 38px;
    height: 24px;
    border-radius: 1rem;
    margin: -0.15rem 0;
    background-color: var(--MENU-HEADER-BORDER-color);
    transition: background-color 0.15s;
  }

  .toggle-color-scheme-button .icon-wrapper > .icon {
    position: absolute;
    top: 5px;
    left: 6px;
    width: 14px;
    height: 14px;
    opacity: 0;
    transform: translateX(0);
    transition: opacity 0.15s, transform 0.15s !important;
  }

  .toggle-color-scheme-button:hover > .icon-wrapper,
  .toggle-color-scheme-button:focus-visible > .icon-wrapper {
    background-color: var(--MENU-VISITED-color);
  }

  .toggle-color-scheme-button:focus-visible {
    outline: 2px solid var(--MAIN-LINK-color);
    outline-offset: 3px;
  }

  /* State: Light (mobility) */
  .toggle-color-scheme-button .label-system,
  .toggle-color-scheme-button .label-dark {
    display: none;
  }
  .toggle-color-scheme-button .icon-wrapper > .icon-sun {
    opacity: 1;
  }

  /* State: Auto (mobility-auto) */
  .toggle-color-scheme-button[data-scheme="auto"] .label-light,
  .toggle-color-scheme-button[data-scheme="auto"] .label-dark {
    display: none;
  }
  .toggle-color-scheme-button[data-scheme="auto"] .label-system {
    display: inline;
  }
  .toggle-color-scheme-button[data-scheme="auto"] .icon-wrapper > .icon-sun {
    opacity: 0;
  }
  .toggle-color-scheme-button[data-scheme="auto"] .icon-wrapper > .icon {
    transform: translateX(6px);
  }
  .toggle-color-scheme-button[data-scheme="auto"] .icon-wrapper > .icon-circle-half {
    opacity: 1;
  }

  /* State: Dark (mobility-dark) */
  .toggle-color-scheme-button[data-scheme="dark"] .label-light,
  .toggle-color-scheme-button[data-scheme="dark"] .label-system {
    display: none;
  }
  .toggle-color-scheme-button[data-scheme="dark"] .label-dark {
    display: inline;
  }
  .toggle-color-scheme-button[data-scheme="dark"] .icon-wrapper > .icon-sun {
    opacity: 0;
  }
  .toggle-color-scheme-button[data-scheme="dark"] .icon-wrapper > .icon {
    transform: translateX(12px);
  }
  .toggle-color-scheme-button[data-scheme="dark"] .icon-wrapper > .icon-moon {
    opacity: 1;
  }
</style>

<a href="#R-body" class="skip-link">Skip to content</a>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Dynamic sidebar: sync body margin-left to sidebar width
  var sidebar = document.getElementById('R-sidebar');
  var bodyEl = document.getElementById('R-body');
  if (sidebar && bodyEl) {
    var sidebarSyncPending = false;
    var lastSidebarWidth = 0;
    function syncSidebarWidth() {
      if (window.innerWidth > 960) {
        var w = sidebar.offsetWidth;
        if (w !== lastSidebarWidth) {
          lastSidebarWidth = w;
          document.documentElement.style.setProperty('--INTERNAL-MENU-L-width', w + 'px');
        }
      } else {
        lastSidebarWidth = 0;
        document.documentElement.style.removeProperty('--INTERNAL-MENU-L-width');
      }
    }
    function debouncedSync() {
      if (!sidebarSyncPending) {
        sidebarSyncPending = true;
        requestAnimationFrame(function() {
          syncSidebarWidth();
          sidebarSyncPending = false;
        });
      }
    }
    syncSidebarWidth();
    window.addEventListener('resize', debouncedSync);
    new MutationObserver(debouncedSync).observe(sidebar, { childList: true, subtree: true });
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(debouncedSync).observe(sidebar);
    }
  }

  // Search: show built-in shortcut in placeholder
  var searchInput = document.getElementById('R-search-by');
  if (searchInput) {
    searchInput.placeholder = 'Search (Ctrl+Alt+F)';
  }

  // ============================================
  // Body Map — mobile two-tap navigation
  // ============================================
  var bodyMapContainer = document.querySelector('.body-map-container');
  if (bodyMapContainer) {
    var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    var activeRegion = null;
    var label = bodyMapContainer.parentElement.querySelector('.body-map-label');

    if (isTouchDevice) {
      bodyMapContainer.addEventListener('click', function(e) {
        var regionEl = e.target.closest('.body-region');

        // Tap on empty space — deselect
        if (!regionEl) {
          if (activeRegion) {
            activeRegion.classList.remove('is-active');
            activeRegion = null;
            if (label) label.textContent = '';
          }
          return;
        }

        var link = regionEl.closest('a');
        var regionSlug = regionEl.dataset.region;

        // Second tap on same region — navigate
        if (activeRegion === regionEl && link) {
          window.location.href = link.getAttribute('href');
          return;
        }

        // First tap — select and show label
        e.preventDefault();
        if (activeRegion) activeRegion.classList.remove('is-active');
        regionEl.classList.add('is-active');
        activeRegion = regionEl;

        if (label && regionSlug) {
          var labels = JSON.parse(bodyMapContainer.dataset.regionLabels || '{}');
          label.textContent = labels[regionSlug] || regionSlug;
        }
      });
    } else {
      // Desktop: show label on hover
      var regions = bodyMapContainer.querySelectorAll('.body-region');
      regions.forEach(function(region) {
        region.addEventListener('mouseenter', function() {
          if (label) {
            var labels = JSON.parse(bodyMapContainer.dataset.regionLabels || '{}');
            label.textContent = labels[region.dataset.region] || region.dataset.region;
          }
        });
        region.addEventListener('mouseleave', function() {
          if (label) label.textContent = '';
        });
      });
    }
  }

  // ============================================
  // Badwater-style color scheme toggle
  // ============================================
  var toggleBtn = document.querySelector('.toggle-color-scheme-button');
  if (toggleBtn) {
    // Map Relearn variant identifiers to toggle states
    var variantToScheme = {
      'mobility': 'light',
      'mobility-auto': 'auto',
      'mobility-dark': 'dark'
    };
    var schemeToVariant = {
      'light': 'mobility',
      'auto': 'mobility-auto',
      'dark': 'mobility-dark'
    };
    var schemeOrder = ['light', 'auto', 'dark'];

    function syncToggle() {
      var select = document.getElementById('R-select-variant');
      if (!select) return;
      var current = select.value;
      var scheme = variantToScheme[current] || 'auto';
      toggleBtn.setAttribute('data-scheme', scheme);
    }

    toggleBtn.addEventListener('click', function () {
      var currentScheme = toggleBtn.getAttribute('data-scheme') || 'light';
      var idx = schemeOrder.indexOf(currentScheme);
      var nextScheme = schemeOrder[(idx + 1) % schemeOrder.length];
      var nextVariant = schemeToVariant[nextScheme];

      // Update Relearn's hidden select and trigger change
      var select = document.getElementById('R-select-variant');
      if (select) {
        select.value = nextVariant;
        window.relearn.changeVariant(nextVariant);
      }
      toggleBtn.setAttribute('data-scheme', nextScheme);
    });

    // Sync on load
    syncToggle();

    // Re-sync if variant changes externally
    document.addEventListener('themeVariantLoaded', syncToggle);
  }
});
</script>
