<!-- Variable fonts: Inter (UI/sans) + Source Serif 4 (body/serif) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" rel="stylesheet">

<style>
  /* Typography: Source Serif 4 for body text, Inter for titles & UI */
  :root {
    --MAIN-font: "Source Serif 4", Georgia, "Times New Roman", serif;
    --MAIN-font-weight: 400;
    --MAIN-font-variation-settings: normal;
    --MAIN-BOLD-font-weight: 600;
    --MAIN-TITLES-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-font-weight: 600;
    --MAIN-TITLES-font-variation-settings: normal;
    --MAIN-TITLES-H1-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-H2-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --MAIN-TITLES-H1-font-weight: 700;
    --MAIN-TITLES-H2-font-weight: 600;
    --CODE-font: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
  }

  /* Limit content width for readability */
  #body .padding {
    max-width: 50rem;
  }

  /* Subtle bottom border on h2 elements */
  #body h2 {
    border-bottom: 1px solid var(--MAIN-LINK-color);
    padding-bottom: 0.3rem;
  }

  /* Body text line-height */
  #body p,
  #body li {
    line-height: 1.6;
  }

  /* Inter for UI elements: sidebar, nav, breadcrumbs, tags, TOC, topbar */
  #R-sidebar,
  #R-header-wrapper,
  .topbar,
  nav.breadcrumbs,
  .inline-toc,
  article .R-taxonomy.tags,
  #body table th {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* --- Link highlight effect --- */
  #body a:not(.term-link):not(.anchor) {
    text-decoration: none;
    background-image: linear-gradient(transparent 60%, rgba(26, 122, 76, 0.15) 60%);
    transition: background-image 0.2s ease;
  }
  #body a:not(.term-link):not(.anchor):hover {
    background-image: linear-gradient(transparent 60%, rgba(26, 122, 76, 0.35) 60%);
  }

  /* --- JD-inspired sidebar styling --- */

  /* Wider sidebar for longer page titles */
  #R-sidebar {
    width: 21rem;
    border-right: 1px solid #e5e5e5;
  }
  #R-body {
    margin-left: 21rem;
  }
  @media screen and (max-width: 56.25em) {
    #R-sidebar {
      width: 18.75rem;
    }
    #R-body {
      margin-left: 0;
    }
  }

  /* Clean separator between sidebar header and content */
  #R-header-wrapper {
    border-bottom: 1px solid #e5e5e5;
  }

  /* Generous spacing on sidebar items */
  #R-sidebar ul li {
    padding-top: 0.15rem;
    padding-bottom: 0.15rem;
  }

  /* Lighter font weight for sidebar links */
  #R-sidebar ul li a {
    font-weight: 400;
    font-size: 0.9rem;
    transition: background-color 0.2s ease;
  }

  /* Subtle right border on active item instead of bold background */
  #R-sidebar ul li.active > a {
    border-right: 3px solid #1a7a4c;
  }

  /* Make the JD numbers slightly bolder so they stand out */
  #R-sidebar ul li a .read-icon-link {
    font-weight: 600;
  }

  /* --- Inline Table of Contents (JD-style) --- */
  .inline-toc {
    background: #f9fafb;
    border: 1px solid #e5e5e5;
    border-radius: 4px;
    padding: 0.75rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
  }

  .inline-toc summary {
    font-weight: 600;
    color: var(--MAIN-TITLES-TEXT-color);
    cursor: pointer;
    margin-bottom: 0.5rem;
  }

  .inline-toc nav > ul,
  .inline-toc #TableOfContents > ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }

  .inline-toc ul ul {
    padding-left: 1.25rem;
  }

  .inline-toc li {
    padding: 0.15rem 0;
    line-height: 1.5;
  }

  .inline-toc a {
    color: var(--MAIN-LINK-color);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .inline-toc a:hover {
    color: var(--MAIN-LINK-HOVER-color);
    text-decoration: underline;
  }

  /* --- Accessibility enhancements --- */

  /* Visible focus indicators for keyboard navigation */
  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  summary:focus-visible {
    outline: 3px solid #1a7a4c;
    outline-offset: 2px;
    border-radius: 2px;
  }

  /* Skip-to-content link (visible on tab) */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 1rem;
    z-index: 9999;
    background: #1a5632;
    color: #ffffff;
    padding: 0.5rem 1rem;
    border-radius: 0 0 4px 4px;
    font-weight: 600;
    text-decoration: none;
  }
  .skip-link:focus {
    top: 0;
  }

  /* Ensure minimum touch target size (44x44px WCAG) */
  #R-sidebar ul li a {
    min-height: 2.75rem;
    display: flex;
    align-items: center;
  }

  /* Reduce motion for users who prefer it */
  @media (prefers-reduced-motion: reduce) {
    * {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }

  /* --- Page metadata header --- */
  .page-meta {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    margin-bottom: 1rem;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.8rem;
  }

  .meta-difficulty {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .meta-difficulty--beginner {
    background: #d4edda;
    color: #155724;
  }

  .meta-difficulty--intermediate {
    background: #fff3cd;
    color: #856404;
  }

  .meta-difficulty--advanced {
    background: #f8d7da;
    color: #721c24;
  }

  .meta-reading-time {
    color: #636e72;
  }

  /* --- Search keyboard hint --- */
  .search-wrapper {
    position: relative;
  }

  .search-shortcut-hint {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    color: #b2bec3;
    background: #f0f0f0;
    border: 1px solid #dfe6e9;
    border-radius: 3px;
    padding: 0.1rem 0.4rem;
    pointer-events: none;
    line-height: 1.4;
  }

  .search-shortcut-hint.hidden {
    display: none;
  }

  /* --- Scroll progress bar --- */
  .scroll-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 3px;
    background: var(--MAIN-LINK-color);
    z-index: 10000;
    transition: width 0.1s ease-out;
  }

  /* High contrast mode support */
  @media (forced-colors: active) {
    .inline-toc {
      border: 2px solid;
    }
    article .R-taxonomy.tags a.term-link {
      border: 1px solid;
    }
  }
</style>

<!-- Skip to content link for keyboard users -->
<a href="#R-body" class="skip-link">Skip to content</a>

<!-- Scroll progress bar -->
<div class="scroll-progress" aria-hidden="true"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var bar = document.querySelector('.scroll-progress');
  var body = document.getElementById('R-body-inner');
  if (!bar || !body) return;
  body.addEventListener('scroll', function() {
    var scrollTop = body.scrollTop;
    var scrollHeight = body.scrollHeight - body.clientHeight;
    var progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    bar.style.width = progress + '%';
  });

  // Search keyboard shortcut hint
  var searchInput = document.getElementById('R-search-by');
  if (searchInput) {
    var wrapper = searchInput.parentElement;
    wrapper.style.position = 'relative';
    var hint = document.createElement('span');
    hint.className = 'search-shortcut-hint';
    hint.textContent = '/';
    hint.setAttribute('aria-hidden', 'true');
    wrapper.appendChild(hint);

    searchInput.addEventListener('focus', function() { hint.classList.add('hidden'); });
    searchInput.addEventListener('blur', function() {
      if (!searchInput.value) hint.classList.remove('hidden');
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        var tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        if (document.activeElement.isContentEditable) return;
        e.preventDefault();
        searchInput.focus();
      }
    });
  }
});
</script>
